name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from egas-data-sync-for-sage.php
        id: version
        run: |
          VERSION=$(grep -i "^ \* Version:" public/plugins/egas-data-sync-for-sage/egas-data-sync-for-sage.php | sed 's/.*Version: *//')

          if [ -z "$VERSION" ]; then
            echo "No version found in egas-data-sync-for-sage.php"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists"
            exit 1
          fi

      - name: Extract image name
        id: image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          docker build \
            -t ghcr.io/$IMAGE_NAME:${{ steps.version.outputs.version }} \
            -t ghcr.io/$IMAGE_NAME:latest \
            .

      - name: Extract plugin from Docker image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          CONTAINER_ID=$(docker create ghcr.io/$IMAGE_NAME:${{ steps.version.outputs.version }})

          mkdir -p plugin_extract
          docker cp $CONTAINER_ID:/var/www/html/public/plugins/egas-data-sync-for-sage plugin_extract/egas-data-sync-for-sage

          docker rm $CONTAINER_ID

      - name: Create plugin package (zip)
        run: |
          cd plugin_extract

          mkdir -p staging1/egas-data-sync-for-sage
          cp -r egas-data-sync-for-sage/. staging1/egas-data-sync-for-sage/
          rm -rf staging1/egas-data-sync-for-sage/assets
          rm -rf staging1/egas-data-sync-for-sage/utils
          rm -f  staging1/egas-data-sync-for-sage/runc
          rm -f  staging1/egas-data-sync-for-sage/.gitignore
          rm -rf  staging1/egas-data-sync-for-sage/node_modules
          rm -f  staging1/egas-data-sync-for-sage/webpack.config.js
          rm -f  staging1/egas-data-sync-for-sage/tsconfig.json
          rm -f  staging1/egas-data-sync-for-sage/package.json
          rm -f  staging1/egas-data-sync-for-sage/yarn.lock
          rm -f  staging1/egas-data-sync-for-sage/rector.php
          (cd staging1 && zip -r ../egas-data-sync-for-sage.zip egas-data-sync-for-sage)

      - name: Create git tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          files: |
            plugin_extract/egas-data-sync-for-sage.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
